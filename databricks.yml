bundle:
  name: fe-anz-energy-hub

variables:
  lakebase_instance_name:
    description: "Lakebase Provisioned instance name"
    default: fe-anz-hub-pg

  pg_database:
    description: "Postgres database name"
    default: databricks_postgres

  pg_schema:
    description: "Application schema name for tables"
    default: expertise

  admin_email:
    description: "Email of the first admin user (seeded on startup)"
    default: ""

  serving_endpoint:
    description: "Databricks Foundation Model serving endpoint"
    default: databricks-claude-sonnet-4-6

targets:
  dev:
    default: true
    workspace:
      host: https://fe-vm-vdm-classic-dz1ef4.cloud.databricks.com
    variables:
      lakebase_instance_name: fe-anz-hub-pg-dev
      admin_email: "zivile.norkunaite@databricks.com"

resources:
  database_instances:
    expertise_db:
      name: ${var.lakebase_instance_name}
      capacity: CU_1

  apps:
    fe_anz_energy_hub:
      name: fe-anz-energy-hub
      description: "FE ANZ Energy & Utilities Industry Hub"
      source_code_path: .
      resources:
        - name: database
          database:
            instance_name: ${resources.database_instances.expertise_db.name}
            database_name: ${var.pg_database}
            permission: CAN_CONNECT_AND_CREATE
      config:
        command: ['python', 'app.py']
        env:
          - name: LAKEBASE_INSTANCE
            value: ${var.lakebase_instance_name}
          - name: PGSCHEMA
            value: ${var.pg_schema}
          - name: ADMIN_EMAIL
            value: ${var.admin_email}
          - name: SERVING_ENDPOINT
            value: ${var.serving_endpoint}
